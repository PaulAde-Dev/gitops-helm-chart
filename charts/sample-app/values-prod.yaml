replicaCount: 3

image:
  repository: 405184066547.dkr.ecr.ca-central-1.amazonaws.com/sample-app
  tag: "prod-latest"

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: sample-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sample-app-tls
      hosts:
        - sample-app.example.com

podDisruptionBudget:
  enabled: true
  minAvailable: 2

keda:
  enabled: true
  minReplicaCount: 3
  maxReplicaCount: 15
  triggers:
    cpu:
      threshold: 70

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sample-app
          topologyKey: kubernetes.io/hostname
